name: PR test compile

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test-compile:
    name: Test compile
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            texlive-pictures \
            texlive-science \
            texlive-plain-generic \
            lmodern \
            pandoc

      - name: Test compile
        run: make test-compile

