name: Build and deploy gh-pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build manual and deploy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            texlive-xetex \
            texlive-pictures \
            texlive-science \
            texlive-plain-generic \
            lmodern \
            pandoc \
            zip

      - name: Full manual build
        run: make manual-git

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/deploy-gha.sh
