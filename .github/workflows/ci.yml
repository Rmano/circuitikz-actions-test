name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test-compile:
    name: Test compile
    runs-on: ubuntu-24.04

    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            texlive-xetex \
            texlive-pictures \
            texlive-science \
            texlive-plain-generic \
            lmodern \
            pandoc

      - name: Test compile
        run: make test-compile

  build-and-deploy:
    name: Build manual and deploy gh-pages
    runs-on: ubuntu-24.04

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            texlive-xetex \
            texlive-pictures \
            texlive-science \
            texlive-plain-generic \
            lmodern \
            pandoc \
            zip

      - name: Full manual build
        run: make manual-git

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/deploy-gha.sh
